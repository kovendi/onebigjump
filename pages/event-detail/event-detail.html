<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Event</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/navbar/navbar.css" />
  <link rel="stylesheet" href="../../modules/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="../../modules/markdown/markdown.css" />
  <link rel="stylesheet" href="../../modules/section-title/section-title.css" />
  <link rel="stylesheet" href="event-detail.css" />
</head>
<body>
  <div id="screen-content">
    <div class="event-detail-page" id="event-detail-page">
      <div class="event-detail" id="event-detail" hidden>
        <div class="event-detail__image-wrap">
          <img class="event-detail__image" id="event-detail-image" alt="" />
        </div>
        <div class="event-detail__body">
          <h1 class="event-detail__name" id="event-detail-name"></h1>
          <div class="event-detail__meta">
            <div class="event-detail__meta-row">
              <span class="event-detail__meta-icon-wrap">
                <img class="event-detail__meta-icon" src="../../assets/icon-calendar.svg" alt="" />
              </span>
              <span id="event-detail-date"></span>
            </div>
            <div class="event-detail__meta-row">
              <span class="event-detail__meta-icon-wrap">
                <img class="event-detail__meta-icon" src="../../assets/icon-location.svg" alt="" />
              </span>
              <span id="event-detail-location"></span>
            </div>
            <div class="event-detail__meta-row">
              <span class="event-detail__meta-icon-wrap">
                <img class="event-detail__meta-icon" src="../../assets/icon-users.svg" alt="" />
              </span>
              <span id="event-detail-followers"></span>
            </div>
            <div class="event-detail__meta-row">
              <span class="event-detail__meta-icon-wrap">
                <img class="event-detail__meta-icon event-detail__meta-icon--ticket" src="../../assets/icon-nav-tickets.svg" alt="" />
              </span>
              <span id="event-detail-price"></span>
            </div>
          </div>

          <div class="event-detail__actions" id="event-detail-actions"></div>

          <div class="event-detail__description-section" id="event-detail-description-section">
            <div class="event-detail__description" id="event-detail-description"></div>
            <button type="button" class="event-detail__description-toggle" id="event-detail-description-toggle" hidden></button>
          </div>

          <div class="event-detail__timeline" id="event-detail-timeline" hidden>
            <ul class="event-detail__timeline-list" id="event-detail-timeline-list"></ul>
          </div>
        </div>
      </div>

      <div class="event-detail-empty" id="event-detail-empty" hidden>
        <img class="event-detail-empty-icon" src="../../assets/icon-info.svg" alt="" />
        <p class="event-detail-empty-title" id="event-detail-empty-title"></p>
        <p class="event-detail-empty-description" id="event-detail-empty-description"></p>
      </div>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/navbar/navbar.js"></script>
  <script src="../../modules/bottom-nav/bottom-nav.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/markdown/markdown.js"></script>
  <script src="../../modules/section-title/section-title.js"></script>
  <script src="../../modules/date/date.js"></script>
  <script src="../events/events-data.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script>
    window.i18n.initI18n();
    window.storage.getDb();
    const t = window.i18n.t;

    const eventDetailPage = document.getElementById('event-detail-page');
    const eventId = new URLSearchParams(window.location.search).get('id');
    const event = window.EVENTS_DATA.find((item) => item.id === eventId);

    eventDetailPage.prepend(
      window.navbarModule.renderNavbar({ title: event ? event.name : '', showBack: true })
    );

    if (event) {
      document.getElementById('event-detail').hidden = false;
      document.getElementById('event-detail-image').src = event.image_url;
      if (event.is_exam) {
        const examBadge = document.createElement('button');
        examBadge.type = 'button';
        examBadge.className = 'event-detail__badge event-detail__badge--exam';
        examBadge.textContent = t('event_card.exam_badge');
        examBadge.addEventListener('click', () => {
          window.location.href = '../good-dog-card/good-dog-card.html';
        });
        document.querySelector('.event-detail__image-wrap').appendChild(examBadge);
      }
      if (!event.is_paid) {
        const freeBadge = document.createElement('div');
        freeBadge.className = 'event-detail__badge event-detail__badge--free';
        freeBadge.textContent = t('event_card.free_badge');
        document.querySelector('.event-detail__image-wrap').appendChild(freeBadge);
      }
      document.getElementById('event-detail-name').textContent = event.name;
      document.getElementById('event-detail-date').textContent = window.dateModule.formatDateRange(event.start_date, event.end_date);
      document.getElementById('event-detail-location').textContent = event.location;
      document.getElementById('event-detail-followers').textContent = `${event.followers_count} ${t('event_card.followers_label')}`;
      document.getElementById('event-detail-price').textContent = event.is_paid
        ? `${event.price} ${event.currency}`
        : t('event_detail.free_label');
      document.getElementById('event-detail-description-section').prepend(
        window.sectionTitleModule.renderSectionTitle({ text: t('event_detail.description_title') })
      );
      const descriptionEl = document.getElementById('event-detail-description');
      const descriptionToggle = document.getElementById('event-detail-description-toggle');
      descriptionEl.innerHTML = window.markdownModule.renderMarkdown(event.description);

      const descriptionToggleIcon = document.createElement('img');
      descriptionToggleIcon.className = 'event-detail__description-toggle-icon';
      descriptionToggleIcon.src = '../../assets/icon-chevron-down.svg';
      descriptionToggleIcon.alt = '';
      const descriptionToggleLabel = document.createElement('span');
      descriptionToggle.appendChild(descriptionToggleIcon);
      descriptionToggle.appendChild(descriptionToggleLabel);

      requestAnimationFrame(() => {
        if (descriptionEl.scrollHeight > descriptionEl.clientHeight + 1) {
          descriptionToggle.hidden = false;
          descriptionToggleLabel.textContent = t('event_detail.description_more');
          descriptionToggle.addEventListener('click', () => {
            const expanded = descriptionEl.classList.toggle('event-detail__description--expanded');
            descriptionToggle.classList.toggle('event-detail__description-toggle--expanded', expanded);
            descriptionToggleLabel.textContent = t(expanded ? 'event_detail.description_less' : 'event_detail.description_more');
          });
        }
      });

      const actions = document.getElementById('event-detail-actions');

      const secondaryActions = document.createElement('div');
      secondaryActions.className = 'event-detail__actions-secondary';
      secondaryActions.appendChild(
        window.buttonModule.renderButton({
          label: t('event_detail.add_to_calendar_action'),
          variant: 'secondary',
          iconSrc: '../../assets/icon-calendar.svg'
        })
      );
      const followButton = window.buttonModule.renderButton({
        label: t('event_card.follow_action'),
        variant: 'text-accent',
        iconSrc: '../../assets/icon-heart-outline.svg'
      });
      let isFollowing = false;
      followButton.addEventListener('click', () => {
        isFollowing = !isFollowing;
        followButton.querySelector('span').textContent = t(isFollowing ? 'event_card.unfollow_action' : 'event_card.follow_action');
        followButton.querySelector('img').src = isFollowing ? '../../assets/icon-heart-accent.svg' : '../../assets/icon-heart-outline.svg';
      });
      secondaryActions.appendChild(followButton);
      actions.appendChild(secondaryActions);

      actions.appendChild(
        window.buttonModule.renderButton({
          label: event.is_paid ? t('event_detail.buy_ticket_action') : t('event_detail.register_action'),
          variant: 'primary',
          iconSrc: '../../assets/icon-nav-tickets.svg',
          onClick: () => { window.location.href = `../ticket-purchase/ticket-purchase.html?id=${event.id}`; }
        })
      );

      if (event.sub_events && event.sub_events.length > 0) {
        const timeline = document.getElementById('event-detail-timeline');
        timeline.hidden = false;
        timeline.prepend(
          window.sectionTitleModule.renderSectionTitle({ text: t('event_detail.timeline_title') })
        );

        const timelineList = document.getElementById('event-detail-timeline-list');
        event.sub_events.forEach((subEvent, index) => {
          const item = document.createElement('li');
          item.className = 'event-detail__timeline-item';

          const markerCol = document.createElement('div');
          markerCol.className = 'event-detail__timeline-marker-col';

          const marker = document.createElement('span');
          marker.className = 'event-detail__timeline-marker';
          markerCol.appendChild(marker);

          if (index < event.sub_events.length - 1) {
            const line = document.createElement('span');
            line.className = 'event-detail__timeline-line';
            markerCol.appendChild(line);
          }

          item.appendChild(markerCol);

          const content = document.createElement('div');
          content.className = 'event-detail__timeline-content';

          const name = document.createElement('p');
          name.className = 'event-detail__timeline-name';
          name.textContent = subEvent.name;
          content.appendChild(name);

          const dates = document.createElement('p');
          dates.className = 'event-detail__timeline-dates';
          dates.textContent = window.dateModule.formatDateRange(subEvent.start_date, subEvent.end_date);
          content.appendChild(dates);

          content.appendChild(
            window.buttonModule.renderButton({
              label: t('event_detail.add_to_calendar_action'),
              variant: 'secondary',
              iconSrc: '../../assets/icon-calendar.svg'
            })
          );

          item.appendChild(content);
          timelineList.appendChild(item);
        });
      }
    } else {
      document.getElementById('event-detail-empty').hidden = false;
      document.getElementById('event-detail-empty-title').textContent = t('event_detail.not_found_title');
      document.getElementById('event-detail-empty-description').textContent = t('event_detail.not_found_description');
    }

    eventDetailPage.appendChild(
      window.bottomNavModule.renderBottomNav({ active: 'events' })
    );

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
