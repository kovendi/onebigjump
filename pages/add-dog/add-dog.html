<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Kutya hozzáadása</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/navbar/navbar.css" />
  <link rel="stylesheet" href="../../modules/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../modules/input/input.css" />
  <link rel="stylesheet" href="../../modules/dropdown/dropdown.css" />
  <link rel="stylesheet" href="../../modules/photo-picker/photo-picker.css" />
  <link rel="stylesheet" href="../../modules/file-upload/file-upload.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="add-dog.css" />
</head>
<body>
  <div id="screen-content">
    <div class="add-dog-page" id="add-dog-page">
      <form class="add-dog-content" id="add-dog-content"></form>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/navbar/navbar.js"></script>
  <script src="../../modules/bottom-nav/bottom-nav.js"></script>
  <script src="../../modules/input/input.js"></script>
  <script src="../../modules/dropdown/dropdown.js"></script>
  <script src="../../modules/photo-picker/photo-picker.js"></script>
  <script src="../../modules/file-upload/file-upload.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script src="../../modules/badge-grid/badge-grid.js"></script>
  <script src="../badge-detail/badges-data.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    const addDogPage = document.getElementById('add-dog-page');
    const form = document.getElementById('add-dog-content');
    const searchParams = new URLSearchParams(window.location.search);
    const returnTo = searchParams.get('returnTo');
    const dogId = searchParams.get('dogId');
    const isRegistrationFlow = searchParams.get('flow') === 'registration';
    const existingDog = dogId ? window.storage.getDogs().find((dog) => dog.id === dogId) : null;
    const redirectUrl = isRegistrationFlow ? '../events/events.html' : (returnTo || '../dogs/dogs.html');

    if (isRegistrationFlow) {
      const title = document.createElement('h1');
      title.className = 'add-dog-registration-title';
      title.textContent = t('add_dog.title');
      addDogPage.prepend(title);
    } else {
      addDogPage.prepend(
        window.navbarModule.renderNavbar({
          title: t(existingDog ? 'add_dog.edit_title' : 'add_dog.title'),
          showBack: true,
          onBackClick: () => { window.location.href = redirectUrl; }
        })
      );
    }

    const formState = existingDog
      ? { photo: existingDog.photo, name: existingDog.name, breed: existingDog.breed, birthdate: existingDog.birthdate, microchip: existingDog.microchip, healthBookFiles: null }
      : { photo: null, name: '', breed: '', birthdate: '', microchip: '', healthBookFiles: null };

    function updateSubmitState() {
      const isComplete = formState.photo && formState.name && formState.breed
        && /^\d{4}-\d{2}-\d{2}$/.test(formState.birthdate) && formState.microchip;
      submitButton.disabled = !isComplete;
    }

    // photo
    const photoField = window.photoPickerModule.renderPhotoPicker({
      name: 'photo',
      onChange: (dataUrl) => {
        formState.photo = dataUrl;
        updateSubmitState();
      }
    });
    if (formState.photo) {
      const circle = photoField.querySelector('.photo-picker__circle');
      circle.innerHTML = '';
      const preview = document.createElement('img');
      preview.className = 'photo-picker__preview';
      preview.src = formState.photo;
      preview.alt = '';
      circle.appendChild(preview);
    }
    form.appendChild(photoField);

    // name
    const nameField = window.inputModule.renderInput({
      name: 'name',
      label: t('add_dog.name_label'),
      placeholder: t('add_dog.name_placeholder')
    });
    const nameInput = nameField.querySelector('input');
    nameInput.value = formState.name;
    nameInput.addEventListener('input', (e) => {
      formState.name = e.target.value.trim();
      updateSubmitState();
    });
    form.appendChild(nameField);

    // breed
    const breedOptions = [
      'labrador', 'golden_retriever', 'border_collie', 'australian_shepherd',
      'belgian_shepherd', 'german_shepherd', 'jack_russell', 'french_bulldog',
      'poodle', 'beagle', 'mixed', 'other'
    ].map((key) => ({ value: key, label: t(`add_dog.breed_${key}`) }));

    const breedField = window.dropdownModule.renderDropdown({
      name: 'breed',
      label: t('add_dog.breed_label'),
      placeholder: t('add_dog.breed_placeholder'),
      options: breedOptions,
      onChange: (value) => { formState.breed = value; updateSubmitState(); }
    });
    if (formState.breed) breedField.querySelector('select').value = formState.breed;
    form.appendChild(breedField);

    // birthdate (native date picker)
    const birthdateField = window.inputModule.renderInput({
      type: 'date',
      name: 'birthdate',
      label: t('add_dog.birthdate_label')
    });
    const birthdateInput = birthdateField.querySelector('input');
    birthdateInput.max = new Date().toISOString().slice(0, 10);
    birthdateInput.value = formState.birthdate ? formState.birthdate.replace(/\//g, '-') : '';
    birthdateInput.addEventListener('change', (e) => {
      formState.birthdate = e.target.value;
      updateSubmitState();
    });
    form.appendChild(birthdateField);

    // microchip
    const microchipField = window.inputModule.renderInput({
      name: 'microchip',
      label: t('add_dog.microchip_label'),
      placeholder: t('add_dog.microchip_placeholder')
    });
    const microchipInput = microchipField.querySelector('input');
    microchipInput.inputMode = 'numeric';
    microchipInput.value = formState.microchip;
    microchipInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 15);
      formState.microchip = e.target.value;
      updateSubmitState();
    });
    form.appendChild(microchipField);

    // health book / passport files
    form.appendChild(
      window.fileUploadModule.renderFileUpload({
        name: 'health-book',
        label: t('add_dog.health_book_label'),
        buttonLabel: t('add_dog.health_book_button'),
        countLabel: (count) => t('add_dog.health_book_count').replace('{count}', count),
        onChange: (files) => { formState.healthBookFiles = files; updateSubmitState(); }
      })
    );

    const submitButton = window.buttonModule.renderButton({
      label: t(isRegistrationFlow ? 'registration.next_button' : (existingDog ? 'add_dog.save_action' : 'add_dog.submit')),
      type: 'submit',
      variant: 'primary'
    });
    submitButton.disabled = !existingDog;
    submitButton.classList.add('add-dog-submit');

    if (isRegistrationFlow) {
      const actions = document.createElement('div');
      actions.className = 'add-dog-registration-actions';
      const skipButton = window.buttonModule.renderButton({
        label: t('registration.skip_button'),
        variant: 'secondary',
        onClick: () => { window.location.href = redirectUrl; }
      });
      actions.appendChild(skipButton);
      actions.appendChild(submitButton);
      form.appendChild(actions);
    } else {
      form.appendChild(submitButton);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const dogData = {
        photo: formState.photo,
        name: formState.name,
        breed: formState.breed,
        birthdate: formState.birthdate,
        microchip: formState.microchip
      };
      if (existingDog) {
        window.storage.updateDog(existingDog.id, dogData);
      } else {
        const newDog = window.storage.addDog(Object.assign({ id: Date.now().toString() }, dogData));

        window.storage.addNotification({
          icon: '../../assets/icon-dogs.svg',
          title: t('notifications.dog_added_title').replace('{name}', newDog.name),
          text: t('notifications.dog_added_text')
        });

        const dogProfileLink = `../dog-profile/dog-profile.html?id=${newDog.id}`;

        window.BADGES_DATA.filter((badgeInfo) => !!newDog[badgeInfo.dogField]).forEach((badgeInfo) => {
          window.storage.addNotification({
            icon: window.badgeGridModule.icons[badgeInfo.icon],
            title: t('notifications.badge_earned_title').replace('{badge}', t(badgeInfo.nameKey)),
            text: t('notifications.badge_earned_text').replace('{name}', newDog.name).replace('{badge}', t(badgeInfo.nameKey)),
            link: dogProfileLink
          });
        });

        if (newDog.goodDogCard) {
          window.storage.addNotification({
            icon: '../../assets/icon-badge-good-dog.svg',
            title: t('notifications.gdc_earned_title'),
            text: t('notifications.gdc_earned_text').replace('{name}', newDog.name),
            link: dogProfileLink
          });
        }
      }
      window.location.href = redirectUrl;
    });

    if (!isRegistrationFlow) {
      addDogPage.appendChild(
        window.bottomNavModule.renderBottomNav({ active: 'dogs' })
      );
    }

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
