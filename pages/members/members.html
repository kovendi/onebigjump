<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Tagok</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/navbar/navbar.css" />
  <link rel="stylesheet" href="../../modules/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../modules/leaderboard-banner/leaderboard-banner.css" />
  <link rel="stylesheet" href="members.css" />
</head>
<body>
  <div id="screen-content">
    <div class="members-page" id="members-page">
      <div class="members-leaderboard-row" id="members-leaderboard-row"></div>
      <div class="members-content" id="members-content"></div>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/navbar/navbar.js"></script>
  <script src="../../modules/bottom-nav/bottom-nav.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script src="../../modules/leaderboard-banner/leaderboard-banner.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    const membersPage = document.getElementById('members-page');
    membersPage.prepend(
      window.navbarModule.renderNavbar({ title: t('members.title'), showSearch: true, onSearchClick: () => { window.location.href = '../search/search.html?type=members'; } })
    );

    document.getElementById('members-leaderboard-row').appendChild(
      window.leaderboardBannerModule.renderLeaderboardBanner({
        title: t('leaderboard_banner.title'),
        subtitle: t('leaderboard_banner.subtitle'),
        onClick: () => { window.location.href = '../leaderboard/leaderboard.html'; }
      })
    );

    const content = document.getElementById('members-content');
    const users = window.storage.getUsers();

    users.forEach((user) => {
      const dogs = window.storage.getDogsByUserId(user.id);

      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'member-item';
      item.addEventListener('click', () => {
        window.location.href = `../profile/profile.html?id=${user.id}`;
      });

      const photo = document.createElement('img');
      photo.className = 'member-photo';
      photo.src = user.photo || '../../assets/icon-nav-profile.svg';
      photo.alt = '';
      item.appendChild(photo);

      const info = document.createElement('div');
      info.className = 'member-info';

      const name = document.createElement('span');
      name.className = 'member-name';
      name.textContent = window.storage.getFullName(user);
      info.appendChild(name);

      const dogsRow = document.createElement('div');
      dogsRow.className = 'member-dogs';

      if (dogs.length === 0) {
        const noDogs = document.createElement('span');
        noDogs.className = 'member-no-dogs';
        noDogs.textContent = t('members.no_dogs');
        dogsRow.appendChild(noDogs);
      } else {
        const bubbles = document.createElement('div');
        bubbles.className = 'member-dog-bubbles';
        dogs.forEach((dog) => {
          const bubble = document.createElement('img');
          bubble.className = 'member-dog-bubble';
          bubble.src = dog.photo || '../../assets/icon-dogs.svg';
          bubble.alt = '';
          bubbles.appendChild(bubble);
        });
        dogsRow.appendChild(bubbles);

        const count = document.createElement('span');
        count.className = 'member-dog-count';
        count.textContent = t('members.dog_count').replace('{count}', dogs.length);
        dogsRow.appendChild(count);
      }

      info.appendChild(dogsRow);
      item.appendChild(info);
      content.appendChild(item);
    });

    membersPage.appendChild(
      window.bottomNavModule.renderBottomNav({ active: 'members' })
    );

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
