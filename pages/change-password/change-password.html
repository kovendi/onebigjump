<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Jelszó módosítása</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/navbar/navbar.css" />
  <link rel="stylesheet" href="../../modules/input/input.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="change-password.css" />
</head>
<body>
  <div id="screen-content">
    <div class="change-password-page" id="change-password-page">
      <p class="change-password-notice" id="change-password-notice"></p>
      <form class="change-password-form" id="change-password-form">
        <div id="old-password-input"></div>
        <div id="new-password-input"></div>
        <div id="confirm-password-input"></div>
        <p class="change-password-error" id="change-password-error" hidden></p>
        <div id="save-button"></div>
      </form>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/navbar/navbar.js"></script>
  <script src="../../modules/input/input.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    const page = document.getElementById('change-password-page');
    page.prepend(
      window.navbarModule.renderNavbar({ title: t('change_password.title'), showBack: true })
    );

    document.getElementById('change-password-notice').textContent = t('change_password.logout_notice');

    const currentUser = window.storage.getCurrentUser();
    const hasPassword = !!(currentUser && currentUser.password);

    if (hasPassword) {
      document.getElementById('old-password-input').replaceWith(
        window.inputModule.renderInput({ type: 'password', name: 'oldPassword', label: t('change_password.old_password_label'), id: 'old-password-input' })
      );
    } else {
      document.getElementById('old-password-input').remove();
    }
    document.getElementById('new-password-input').replaceWith(
      window.inputModule.renderInput({ type: 'password', name: 'newPassword', label: t('change_password.new_password_label'), id: 'new-password-input' })
    );
    document.getElementById('confirm-password-input').replaceWith(
      window.inputModule.renderInput({ type: 'password', name: 'confirmPassword', label: t('change_password.confirm_password_label'), id: 'confirm-password-input' })
    );
    document.getElementById('save-button').replaceWith(
      window.buttonModule.renderButton({ label: t('change_password.save_button'), variant: 'primary', type: 'submit' })
    );

    document.querySelectorAll('#change-password-form input').forEach((input) => { input.required = true; });

    const errorEl = document.getElementById('change-password-error');

    document.getElementById('change-password-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const oldPassword = formData.get('oldPassword');
      const newPassword = formData.get('newPassword');
      const confirmPassword = formData.get('confirmPassword');

      if (hasPassword && currentUser.password !== oldPassword) {
        errorEl.textContent = t('change_password.old_password_incorrect');
        errorEl.hidden = false;
        return;
      }

      if (newPassword !== confirmPassword) {
        errorEl.textContent = t('change_password.passwords_dont_match');
        errorEl.hidden = false;
        return;
      }

      errorEl.hidden = true;
      window.storage.updateUser({ password: newPassword });
      window.location.href = '../login/login.html';
    });

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
