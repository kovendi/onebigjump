<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Login</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/input/input.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="../../modules/language-switcher/language-switcher.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div id="screen-content">
    <img class="login-bg-blob login-bg-blob--teal" src="../../assets/blob-teal.svg" alt="" />
    <img class="login-bg-blob login-bg-blob--pink" src="../../assets/blob-pink.svg" alt="" />
    <div id="language-switcher"></div>
    <div class="login-page">
      <img class="login-logo" src="../../assets/onebigjump.png" alt="One Big Jump" />

      <div class="login-stats">
        <div class="login-stat-badge">
          <img class="login-stat-icon" src="../../assets/icon-users.svg" alt="" />
          <span class="login-stat-value" id="registration-counter"></span>
          <span class="login-stat-label" id="registration-label"></span>
        </div>
        <div class="login-stat-badge">
          <img class="login-stat-icon" src="../../assets/icon-dogs.svg" alt="" />
          <span class="login-stat-value" id="registration-dogs-counter"></span>
          <span class="login-stat-label" id="registration-dogs-label"></span>
        </div>
      </div>

      <h1 class="login-title" id="login-title"></h1>

      <form class="login-form" id="login-form">
        <div id="email-input"></div>
        <div id="password-input"></div>
        <p class="login-error" id="login-error" hidden></p>
        <div id="submit-button"></div>
      </form>

      <div class="login-divider">
        <span id="or-divider-text"></span>
      </div>

      <div class="login-social-buttons">
        <button type="button" class="login-social-button" id="google-login-button">
          <img class="login-social-icon" src="../../assets/icon-google.svg" alt="" />
          <span id="google-login-text"></span>
        </button>
        <button type="button" class="login-social-button" id="apple-login-button">
          <img class="login-social-icon" src="../../assets/icon-apple.svg" alt="" />
          <span id="apple-login-text"></span>
        </button>
      </div>

      <p class="login-signup-hint">
        <span id="no-account-text"></span>
        <a href="../registration/registration.html" id="signup-link"></a>
      </p>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/input/input.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/language-switcher/language-switcher.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script>
    window.i18n.initI18n();
    window.storage.getDb();
    const t = window.i18n.t;

    document.getElementById('language-switcher').replaceWith(
      window.languageSwitcherModule.renderLanguageSwitcher()
    );

    document.getElementById('registration-counter').textContent = '3 482';
    document.getElementById('registration-label').textContent = t('login.stats_users_label');
    document.getElementById('registration-dogs-counter').textContent = '2 917';
    document.getElementById('registration-dogs-label').textContent = t('login.stats_dogs_label');
    document.getElementById('login-title').textContent = t('login.title');
    document.getElementById('no-account-text').textContent = t('login.no_account');
    document.getElementById('signup-link').textContent = t('login.signup_link');
    document.getElementById('or-divider-text').textContent = t('login.or_divider');
    document.getElementById('google-login-text').textContent = t('login.google');
    document.getElementById('apple-login-text').textContent = t('login.apple');

    document.getElementById('email-input').replaceWith(
      window.inputModule.renderInput({ type: 'email', name: 'email', label: t('login.email_label'), placeholder: t('login.email_placeholder'), id: 'email-input', required: true })
    );
    document.getElementById('password-input').replaceWith(
      window.inputModule.renderInput({ type: 'password', name: 'password', label: t('login.password_label'), placeholder: t('login.password_placeholder'), id: 'password-input', required: true })
    );
    document.getElementById('submit-button').replaceWith(
      window.buttonModule.renderButton({ label: t('login.submit'), variant: 'primary', type: 'submit' })
    );

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const errorEl = document.getElementById('login-error');
      const user = window.storage.loginUser(formData.get('email'), formData.get('password'));
      if (!user) {
        errorEl.textContent = t('login.error_invalid');
        errorEl.hidden = false;
        return;
      }
      errorEl.hidden = true;
      window.location.href = '../events/events.html';
    });

    document.getElementById('google-login-button').addEventListener('click', () => {
      window.location.href = '../registration/registration.html?social=google&email=' + encodeURIComponent('google.user@gmail.com');
    });
    document.getElementById('apple-login-button').addEventListener('click', () => {
      window.location.href = '../registration/registration.html?social=apple&email=' + encodeURIComponent('apple.user@icloud.com');
    });

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
