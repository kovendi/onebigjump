<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Registration</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/input/input.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="registration.css" />
</head>
<body>
  <div id="screen-content">
    <img class="registration-bg-blob registration-bg-blob--teal" src="../../assets/blob-teal.svg" alt="" />
    <img class="registration-bg-blob registration-bg-blob--pink" src="../../assets/blob-pink.svg" alt="" />
    <div class="registration-page">
      <img class="registration-logo" src="../../assets/onebigjump.png" alt="One Big Jump" />

      <h1 class="registration-title" id="registration-title"></h1>

      <form class="registration-form" id="registration-form">
        <div id="email-input"></div>

        <div id="username-input"></div>
        <p class="registration-hint">
          <img class="registration-hint-icon" src="../../assets/icon-info.svg" alt="" />
          <span id="username-hint"></span>
        </p>

        <div id="first-name-input"></div>

        <div id="last-name-input"></div>

        <div id="password-fields">
          <div id="password-input"></div>
          <div id="password-confirm-input"></div>
        </div>

        <div class="registration-actions">
          <div id="back-button"></div>
          <div id="submit-button"></div>
        </div>
      </form>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/input/input.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script>
    window.i18n.initI18n();
    window.storage.getDb();
    const t = window.i18n.t;

    const params = new URLSearchParams(window.location.search);
    const socialProvider = params.get('social');
    const socialEmail = params.get('email') || '';

    document.getElementById('registration-title').textContent = t('registration.title');
    document.getElementById('username-hint').textContent = t('registration.username_hint');

    if (socialProvider) {
      const display = document.createElement('div');
      display.className = 'registration-social-email';
      display.innerHTML = `
        <span class="registration-social-email__label">${t('registration.email_label')}</span>
        <span class="registration-social-email__value">
          <img class="registration-social-email__icon" src="../../assets/icon-${socialProvider}.svg" alt="" />
          ${socialEmail}
        </span>
        <input type="hidden" name="email" value="${socialEmail}" />
      `;
      document.getElementById('email-input').replaceWith(display);
    } else {
      document.getElementById('email-input').replaceWith(
        window.inputModule.renderInput({ type: 'email', name: 'email', label: t('registration.email_label'), placeholder: t('registration.email_placeholder'), id: 'email-input' })
      );
    }
    document.getElementById('username-input').replaceWith(
      window.inputModule.renderInput({ type: 'text', name: 'username', label: t('registration.username_label'), placeholder: t('registration.username_placeholder'), id: 'username-input' })
    );

    function generateUsernameFromEmail(email) {
      const localPart = email.split('@')[0] || '';
      return localPart.toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    const emailFormatRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const usernameField = document.getElementById('username-input');
    let usernameManuallyEdited = false;
    usernameField.addEventListener('input', () => { usernameManuallyEdited = true; });

    if (socialProvider) {
      if (emailFormatRegex.test(socialEmail)) {
        usernameField.value = generateUsernameFromEmail(socialEmail);
      }
    } else {
      document.getElementById('email-input').addEventListener('input', (e) => {
        const email = e.target.value;
        if (!usernameManuallyEdited && emailFormatRegex.test(email)) {
          usernameField.value = generateUsernameFromEmail(email);
        }
      });
    }

    document.getElementById('first-name-input').replaceWith(
      window.inputModule.renderInput({ type: 'text', name: 'first_name', label: t('registration.first_name_label'), placeholder: t('registration.first_name_placeholder'), id: 'first-name-input' })
    );
    document.getElementById('last-name-input').replaceWith(
      window.inputModule.renderInput({ type: 'text', name: 'last_name', label: t('registration.last_name_label'), placeholder: t('registration.last_name_placeholder'), id: 'last-name-input' })
    );

    if (socialProvider) {
      document.getElementById('password-fields').remove();
    } else {
      document.getElementById('password-input').replaceWith(
        window.inputModule.renderInput({ type: 'password', name: 'password', label: t('registration.password_label'), placeholder: t('registration.password_placeholder'), id: 'password-input' })
      );
      document.getElementById('password-confirm-input').replaceWith(
        window.inputModule.renderInput({ type: 'password', name: 'password_confirm', label: t('registration.password_confirm_label'), placeholder: t('registration.password_confirm_placeholder'), id: 'password-confirm-input' })
      );
    }

    document.querySelectorAll('#registration-form input:not([type="hidden"])').forEach((input) => { input.required = true; });

    document.getElementById('back-button').replaceWith(
      window.buttonModule.renderButton({ label: t('registration.back_button'), variant: 'secondary', onClick: () => { window.location.href = '../login/login.html'; } })
    );
    document.getElementById('submit-button').replaceWith(
      window.buttonModule.renderButton({ label: t('registration.next_button'), variant: 'primary', type: 'submit' })
    );

    document.getElementById('registration-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);

      const newUser = window.storage.addUser({
        id: 'user-' + Date.now(),
        email: formData.get('email'),
        username: formData.get('username'),
        firstName: formData.get('first_name'),
        lastName: formData.get('last_name'),
        password: formData.get('password'),
        invitedByUsername: null
      });
      window.storage.setCurrentUser(newUser.id);
      window.location.href = '../registration-referral/registration-referral.html';
    });

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
