<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Profil</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/navbar/navbar.css" />
  <link rel="stylesheet" href="../../modules/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../modules/section-title/section-title.css" />
  <link rel="stylesheet" href="../../modules/photo-picker/photo-picker.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="../../modules/modal/modal.css" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body>
  <div id="screen-content">
    <div class="profile-page" id="profile-page">
      <div class="profile-content" id="profile-content"></div>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/navbar/navbar.js"></script>
  <script src="../../modules/bottom-nav/bottom-nav.js"></script>
  <script src="../../modules/section-title/section-title.js"></script>
  <script src="../../modules/photo-picker/photo-picker.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/modal/modal.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    const params = new URLSearchParams(window.location.search);
    const viewedId = params.get('id');
    const currentUser = window.storage.getCurrentUser();
    const user = viewedId ? window.storage.getUserById(viewedId) : currentUser;
    const isOwnProfile = !viewedId || (currentUser && viewedId === currentUser.id);

    const profilePage = document.getElementById('profile-page');
    profilePage.prepend(
      window.navbarModule.renderNavbar({ title: isOwnProfile ? t('profile.title') : user.name })
    );

    const content = document.getElementById('profile-content');

    // photo
    if (isOwnProfile) {
      const photoPicker = window.photoPickerModule.renderPhotoPicker({
        name: 'profile-photo',
        onChange: (file) => {
          const reader = new FileReader();
          reader.onload = () => {
            window.storage.updateUser({ photo: reader.result });
          };
          reader.readAsDataURL(file);
        }
      });
      if (user.photo) {
        const circle = photoPicker.querySelector('.photo-picker__circle');
        circle.innerHTML = '';
        const preview = document.createElement('img');
        preview.className = 'photo-picker__preview';
        preview.src = user.photo;
        preview.alt = '';
        circle.appendChild(preview);
      }
      content.appendChild(photoPicker);
    } else {
      const photoWrap = document.createElement('div');
      photoWrap.className = 'photo-picker';
      const circle = document.createElement('div');
      circle.className = 'photo-picker__circle';
      const preview = document.createElement('img');
      preview.className = 'photo-picker__preview';
      preview.src = user.photo || '../../assets/icon-nav-profile.svg';
      preview.alt = '';
      circle.appendChild(preview);
      photoWrap.appendChild(circle);
      content.appendChild(photoWrap);
    }

    // basics
    content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('profile.basics_title') }));

    const basics = document.createElement('div');
    basics.className = 'profile-fields';

    function renderStaticField(label, value) {
      const row = document.createElement('div');
      row.className = 'profile-field';
      const labelEl = document.createElement('span');
      labelEl.className = 'profile-field-label';
      labelEl.textContent = label;
      const valueEl = document.createElement('span');
      valueEl.className = 'profile-field-value';
      valueEl.textContent = value;
      row.appendChild(labelEl);
      row.appendChild(valueEl);
      return row;
    }

    if (isOwnProfile) {
      basics.appendChild(renderStaticField(t('profile.email_label'), user.email));

      // editable username (only once)
      const usernameRow = document.createElement('div');
      usernameRow.className = 'profile-field';

      const usernameLabel = document.createElement('span');
      usernameLabel.className = 'profile-field-label';
      usernameLabel.textContent = t('profile.username_label');
      usernameRow.appendChild(usernameLabel);

      const usernameEditWrap = document.createElement('div');
      usernameEditWrap.className = 'profile-name-edit';

      const usernameValue = document.createElement('span');
      usernameValue.className = 'profile-field-value';
      usernameValue.textContent = user.username;

      const usernameInput = document.createElement('input');
      usernameInput.type = 'text';
      usernameInput.className = 'profile-name-input';
      usernameInput.value = user.username;
      usernameInput.hidden = true;

      usernameEditWrap.appendChild(usernameValue);
      usernameEditWrap.appendChild(usernameInput);

      const usernameWarning = document.createElement('p');
      usernameWarning.className = 'profile-username-warning';
      usernameWarning.textContent = t('profile.username_change_warning_message');
      usernameWarning.hidden = true;

      if (!user.usernameChanged) {
        const usernameEditButton = document.createElement('button');
        usernameEditButton.type = 'button';
        usernameEditButton.className = 'profile-name-action-button';
        usernameEditButton.setAttribute('aria-label', t('dog_profile.edit_action'));
        const usernameEditIcon = document.createElement('img');
        usernameEditIcon.className = 'profile-name-action-icon';
        usernameEditIcon.src = '../../assets/icon-edit.svg';
        usernameEditIcon.alt = '';
        usernameEditButton.appendChild(usernameEditIcon);

        const usernameCancelButton = document.createElement('button');
        usernameCancelButton.type = 'button';
        usernameCancelButton.className = 'profile-name-action-button';
        usernameCancelButton.setAttribute('aria-label', t('common.cancel'));
        usernameCancelButton.hidden = true;
        const usernameCancelIcon = document.createElement('img');
        usernameCancelIcon.className = 'profile-name-action-icon';
        usernameCancelIcon.src = '../../assets/icon-close.svg';
        usernameCancelIcon.alt = '';
        usernameCancelButton.appendChild(usernameCancelIcon);

        function enterUsernameEditMode() {
          usernameValue.hidden = true;
          usernameInput.hidden = false;
          usernameInput.value = user.username;
          usernameInput.focus();
          usernameEditIcon.src = '../../assets/icon-check.svg';
          usernameEditButton.disabled = true;
          usernameCancelButton.hidden = false;
          usernameWarning.hidden = false;
        }

        function exitUsernameEditMode() {
          usernameValue.hidden = false;
          usernameInput.hidden = true;
          usernameEditIcon.src = '../../assets/icon-edit.svg';
          usernameEditButton.disabled = false;
          usernameCancelButton.hidden = true;
          usernameWarning.hidden = true;
        }

        function saveUsername() {
          const newUsername = usernameInput.value.trim();
          if (newUsername) {
            user.username = newUsername;
            user.usernameChanged = true;
            window.storage.updateUser({ username: newUsername, usernameChanged: true });
            usernameValue.textContent = newUsername;
          }
          exitUsernameEditMode();
          usernameEditButton.remove();
          usernameCancelButton.remove();
        }

        function cancelUsernameEdit() {
          usernameInput.value = user.username;
          exitUsernameEditMode();
        }

        usernameInput.addEventListener('input', () => {
          usernameEditButton.disabled = usernameInput.value.trim() === user.username;
        });

        usernameEditButton.addEventListener('click', () => {
          if (usernameInput.hidden) {
            enterUsernameEditMode();
          } else {
            saveUsername();
          }
        });

        usernameCancelButton.addEventListener('click', cancelUsernameEdit);

        usernameInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !usernameEditButton.disabled) saveUsername();
        });

        usernameEditWrap.appendChild(usernameEditButton);
        usernameEditWrap.appendChild(usernameCancelButton);
      }

      usernameRow.appendChild(usernameEditWrap);
      basics.appendChild(usernameRow);
      basics.appendChild(usernameWarning);
    }

    if (isOwnProfile) {
      // editable full name
      const nameRow = document.createElement('div');
      nameRow.className = 'profile-field';

      const nameLabel = document.createElement('span');
      nameLabel.className = 'profile-field-label';
      nameLabel.textContent = t('profile.name_label');
      nameRow.appendChild(nameLabel);

      const nameEditWrap = document.createElement('div');
      nameEditWrap.className = 'profile-name-edit';

      const nameValue = document.createElement('span');
      nameValue.className = 'profile-field-value';
      nameValue.textContent = user.name;

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.className = 'profile-name-input';
      nameInput.value = user.name;
      nameInput.hidden = true;

      const editButton = document.createElement('button');
      editButton.type = 'button';
      editButton.className = 'profile-name-action-button';
      editButton.setAttribute('aria-label', t('dog_profile.edit_action'));
      const editIcon = document.createElement('img');
      editIcon.className = 'profile-name-action-icon';
      editIcon.src = '../../assets/icon-edit.svg';
      editIcon.alt = '';
      editButton.appendChild(editIcon);

      const nameCancelButton = document.createElement('button');
      nameCancelButton.type = 'button';
      nameCancelButton.className = 'profile-name-action-button';
      nameCancelButton.setAttribute('aria-label', t('common.cancel'));
      nameCancelButton.hidden = true;
      const nameCancelIcon = document.createElement('img');
      nameCancelIcon.className = 'profile-name-action-icon';
      nameCancelIcon.src = '../../assets/icon-close.svg';
      nameCancelIcon.alt = '';
      nameCancelButton.appendChild(nameCancelIcon);

      function enterEditMode() {
        nameValue.hidden = true;
        nameInput.hidden = false;
        nameInput.value = user.name;
        nameInput.focus();
        editIcon.src = '../../assets/icon-check.svg';
        editButton.disabled = true;
        nameCancelButton.hidden = false;
      }

      function exitEditMode() {
        nameValue.hidden = false;
        nameInput.hidden = true;
        editIcon.src = '../../assets/icon-edit.svg';
        editButton.disabled = false;
        nameCancelButton.hidden = true;
      }

      function saveName() {
        const newName = nameInput.value.trim();
        if (newName) {
          user.name = newName;
          window.storage.updateUser({ name: newName });
          nameValue.textContent = newName;
        }
        exitEditMode();
      }

      function cancelNameEdit() {
        nameInput.value = user.name;
        exitEditMode();
      }

      nameInput.addEventListener('input', () => {
        editButton.disabled = nameInput.value.trim() === user.name;
      });

      editButton.addEventListener('click', () => {
        if (nameInput.hidden) {
          enterEditMode();
        } else {
          saveName();
        }
      });

      nameCancelButton.addEventListener('click', cancelNameEdit);

      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !editButton.disabled) saveName();
      });

      nameEditWrap.appendChild(nameValue);
      nameEditWrap.appendChild(nameInput);
      nameEditWrap.appendChild(editButton);
      nameEditWrap.appendChild(nameCancelButton);
      nameRow.appendChild(nameEditWrap);

      basics.appendChild(nameRow);
    } else {
      basics.appendChild(renderStaticField(t('profile.name_label'), user.name));
    }
    content.appendChild(basics);

    // dogs
    content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('profile.dogs_title') }));

    const dogsList = document.createElement('div');
    dogsList.className = 'profile-dogs';

    const dogs = isOwnProfile ? window.storage.getDogs() : window.storage.getDogsByUserId(user.id);
    if (dogs.length === 0) {
      const empty = document.createElement('p');
      empty.className = 'profile-dogs-empty';
      empty.textContent = t('profile.dogs_empty');
      dogsList.appendChild(empty);
    } else {
      dogs.forEach((dog) => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'profile-dog-item';
        item.addEventListener('click', () => {
          window.location.href = `../dog-profile/dog-profile.html?id=${dog.id}`;
        });

        const photoWrap = document.createElement('span');
        photoWrap.className = 'profile-dog-photo-wrap';

        const photo = document.createElement('img');
        photo.className = 'profile-dog-photo';
        photo.src = dog.photo || '../../assets/icon-dogs.svg';
        photo.alt = '';
        photoWrap.appendChild(photo);

        if (dog.goodDogCard) {
          const badge = document.createElement('img');
          badge.className = 'profile-dog-badge';
          badge.src = '../../assets/icon-badge-good-dog.svg';
          badge.alt = t('dog_card.good_dog_badge');
          photoWrap.appendChild(badge);
        }

        item.appendChild(photoWrap);

        const name = document.createElement('span');
        name.className = 'profile-dog-name';
        name.textContent = dog.name;
        item.appendChild(name);

        dogsList.appendChild(item);
      });
    }

    content.appendChild(dogsList);

    // account
    if (isOwnProfile) {
      content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('profile.account_title') }));

      var openConfirmModal = function ({ title, message, actionLabel, onConfirm }) {
        const wrap = document.createElement('div');
        wrap.className = 'profile-confirm';

        const titleEl = document.createElement('h3');
        titleEl.className = 'profile-confirm-title';
        titleEl.textContent = title;
        wrap.appendChild(titleEl);

        const messageEl = document.createElement('p');
        messageEl.className = 'profile-confirm-message';
        messageEl.textContent = message;
        wrap.appendChild(messageEl);

        const actions = document.createElement('div');
        actions.className = 'profile-confirm-actions';

        actions.appendChild(window.buttonModule.renderButton({
          label: t('common.cancel'),
          variant: 'secondary',
          onClick: () => window.modalModule.closeModal()
        }));

        actions.appendChild(window.buttonModule.renderButton({
          label: actionLabel,
          variant: 'primary',
          onClick: () => {
            window.modalModule.closeModal();
            onConfirm();
          }
        }));

        wrap.appendChild(actions);
        window.modalModule.openModal(wrap);
      };

      const renderAccountRow = (label, extraClass, onClick) => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = `profile-account-row ${extraClass}`;
        row.textContent = label;
        row.addEventListener('click', onClick);
        return row;
      };

      const accountActions = document.createElement('div');
      accountActions.className = 'profile-account-actions';

      accountActions.appendChild(renderAccountRow(
        t('profile.change_password_button'),
        'profile-account-row--default',
        () => {
          window.location.href = '../change-password/change-password.html';
        }
      ));

      accountActions.appendChild(renderAccountRow(
        t('profile.logout_button'),
        'profile-account-row--default',
        () => {
          openConfirmModal({
            title: t('profile.logout_confirm_title'),
            message: t('profile.logout_confirm_message'),
            actionLabel: t('profile.logout_confirm_action'),
            onConfirm: () => {
              window.location.href = '../login/login.html';
            }
          });
        }
      ));

      accountActions.appendChild(renderAccountRow(
        t('profile.delete_account_button'),
        'profile-account-row--danger',
        () => {
          openConfirmModal({
            title: t('profile.delete_account_confirm_title'),
            message: t('profile.delete_account_confirm_message'),
            actionLabel: t('profile.delete_account_confirm_action'),
            onConfirm: () => {
              window.storage.deleteCurrentUser();
              window.location.href = '../login/login.html';
            }
          });
        }
      ));

      content.appendChild(accountActions);
    }

    profilePage.appendChild(
      window.bottomNavModule.renderBottomNav({ active: isOwnProfile ? 'profile' : 'members' })
    );

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
