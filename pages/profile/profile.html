<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Profil</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/navbar/navbar.css" />
  <link rel="stylesheet" href="../../modules/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../modules/section-title/section-title.css" />
  <link rel="stylesheet" href="../../modules/photo-picker/photo-picker.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="../../modules/modal/modal.css" />
  <link rel="stylesheet" href="../../modules/input/input.css" />
  <link rel="stylesheet" href="../../modules/badge-grid/badge-grid.css" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body>
  <div id="screen-content">
    <div class="profile-page" id="profile-page">
      <div class="profile-content" id="profile-content"></div>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/navbar/navbar.js"></script>
  <script src="../../modules/bottom-nav/bottom-nav.js"></script>
  <script src="../../modules/section-title/section-title.js"></script>
  <script src="../../modules/photo-picker/photo-picker.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/modal/modal.js"></script>
  <script src="../../modules/input/input.js"></script>
  <script src="../../modules/badge-grid/badge-grid.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script src="../badge-detail/user-badges-data.js"></script>
  <script src="../../modules/date/date.js"></script>
  <script src="../events/events-data.js"></script>
  <script src="../../modules/events-store/events-store.js"></script>
  <script src="profile-account.js"></script>
  <script src="profile-dogs.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    const params = new URLSearchParams(window.location.search);
    const viewedId = params.get('id');
    const currentUser = window.storage.getCurrentUser();
    const user = viewedId ? window.storage.getUserById(viewedId) : currentUser;
    const isOwnProfile = !viewedId || (currentUser && viewedId === currentUser.id);

    const profilePage = document.getElementById('profile-page');
    profilePage.prepend(
      window.navbarModule.renderNavbar({ title: isOwnProfile ? t('profile.title') : window.storage.getFullName(user) })
    );

    const content = document.getElementById('profile-content');

    // photo
    if (isOwnProfile) {
      const photoPicker = window.photoPickerModule.renderPhotoPicker({
        name: 'profile-photo',
        onChange: (dataUrl) => {
          window.storage.updateUser({ photo: dataUrl });
        }
      });
      if (user.photo) {
        const circle = photoPicker.querySelector('.photo-picker__circle');
        circle.innerHTML = '';
        const preview = document.createElement('img');
        preview.className = 'photo-picker__preview';
        preview.src = user.photo;
        preview.alt = '';
        circle.appendChild(preview);
      }
      content.appendChild(photoPicker);
    } else {
      const photoWrap = document.createElement('div');
      photoWrap.className = 'photo-picker';
      const circle = document.createElement('div');
      circle.className = 'photo-picker__circle';
      const preview = document.createElement('img');
      preview.className = 'photo-picker__preview';
      preview.src = user.photo || '../../assets/icon-nav-profile.svg';
      preview.alt = '';
      circle.appendChild(preview);
      photoWrap.appendChild(circle);
      content.appendChild(photoWrap);
    }

    // basics
    content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('profile.basics_title') }));

    const basics = document.createElement('div');
    basics.className = 'profile-fields';

    function renderStaticField(label, value) {
      const row = document.createElement('div');
      row.className = 'profile-field';
      const labelEl = document.createElement('span');
      labelEl.className = 'profile-field-label';
      labelEl.textContent = label;
      const valueEl = document.createElement('span');
      valueEl.className = 'profile-field-value';
      valueEl.textContent = value;
      row.appendChild(labelEl);
      row.appendChild(valueEl);
      return row;
    }

    if (isOwnProfile) {
      basics.appendChild(renderStaticField(t('profile.email_label'), user.email));

      // editable username (only once)
      const usernameRow = document.createElement('div');
      usernameRow.className = 'profile-field';

      const usernameLabel = document.createElement('span');
      usernameLabel.className = 'profile-field-label';
      usernameLabel.textContent = t('profile.username_label');
      usernameRow.appendChild(usernameLabel);

      const usernameEditWrap = document.createElement('div');
      usernameEditWrap.className = 'profile-name-edit';

      const usernameValue = document.createElement('span');
      usernameValue.className = 'profile-field-value';
      usernameValue.textContent = user.username;

      const usernameInput = document.createElement('input');
      usernameInput.type = 'text';
      usernameInput.className = 'profile-name-input';
      usernameInput.value = user.username;
      usernameInput.hidden = true;

      usernameEditWrap.appendChild(usernameValue);
      usernameEditWrap.appendChild(usernameInput);

      const usernameWarning = document.createElement('p');
      usernameWarning.className = 'profile-username-warning';
      usernameWarning.textContent = t('profile.username_change_warning_message');
      usernameWarning.hidden = true;

      if (!user.usernameChanged) {
        const usernameEditButton = document.createElement('button');
        usernameEditButton.type = 'button';
        usernameEditButton.className = 'profile-name-action-button';
        usernameEditButton.setAttribute('aria-label', t('dog_profile.edit_action'));
        const usernameEditIcon = document.createElement('img');
        usernameEditIcon.className = 'profile-name-action-icon';
        usernameEditIcon.src = '../../assets/icon-edit.svg';
        usernameEditIcon.alt = '';
        usernameEditButton.appendChild(usernameEditIcon);

        const usernameCancelButton = document.createElement('button');
        usernameCancelButton.type = 'button';
        usernameCancelButton.className = 'profile-name-action-button';
        usernameCancelButton.setAttribute('aria-label', t('common.cancel'));
        usernameCancelButton.hidden = true;
        const usernameCancelIcon = document.createElement('img');
        usernameCancelIcon.className = 'profile-name-action-icon';
        usernameCancelIcon.src = '../../assets/icon-close.svg';
        usernameCancelIcon.alt = '';
        usernameCancelButton.appendChild(usernameCancelIcon);

        function enterUsernameEditMode() {
          usernameValue.hidden = true;
          usernameInput.hidden = false;
          usernameInput.value = user.username;
          usernameInput.focus();
          usernameEditIcon.src = '../../assets/icon-check.svg';
          usernameEditButton.disabled = true;
          usernameCancelButton.hidden = false;
          usernameWarning.hidden = false;
        }

        function exitUsernameEditMode() {
          usernameValue.hidden = false;
          usernameInput.hidden = true;
          usernameEditIcon.src = '../../assets/icon-edit.svg';
          usernameEditButton.disabled = false;
          usernameCancelButton.hidden = true;
          usernameWarning.hidden = true;
        }

        function saveUsername() {
          const newUsername = usernameInput.value.trim();
          if (newUsername) {
            user.username = newUsername;
            user.usernameChanged = true;
            window.storage.updateUser({ username: newUsername, usernameChanged: true });
            usernameValue.textContent = newUsername;
          }
          exitUsernameEditMode();
          usernameEditButton.remove();
          usernameCancelButton.remove();
        }

        function cancelUsernameEdit() {
          usernameInput.value = user.username;
          exitUsernameEditMode();
        }

        usernameInput.addEventListener('input', () => {
          usernameEditButton.disabled = usernameInput.value.trim() === user.username;
        });

        usernameEditButton.addEventListener('click', () => {
          if (usernameInput.hidden) {
            enterUsernameEditMode();
          } else {
            saveUsername();
          }
        });

        usernameCancelButton.addEventListener('click', cancelUsernameEdit);

        usernameInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !usernameEditButton.disabled) saveUsername();
        });

        usernameEditWrap.appendChild(usernameEditButton);
        usernameEditWrap.appendChild(usernameCancelButton);
      }

      usernameRow.appendChild(usernameEditWrap);
      basics.appendChild(usernameRow);
      basics.appendChild(usernameWarning);
    }

    function renderEditableNamePart(labelText, field) {
      const row = document.createElement('div');
      row.className = 'profile-field';

      const label = document.createElement('span');
      label.className = 'profile-field-label';
      label.textContent = labelText;
      row.appendChild(label);

      const editWrap = document.createElement('div');
      editWrap.className = 'profile-name-edit';

      const value = document.createElement('span');
      value.className = 'profile-field-value';
      value.textContent = user[field];

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'profile-name-input';
      input.value = user[field];
      input.hidden = true;

      const editButton = document.createElement('button');
      editButton.type = 'button';
      editButton.className = 'profile-name-action-button';
      editButton.setAttribute('aria-label', t('dog_profile.edit_action'));
      const editIcon = document.createElement('img');
      editIcon.className = 'profile-name-action-icon';
      editIcon.src = '../../assets/icon-edit.svg';
      editIcon.alt = '';
      editButton.appendChild(editIcon);

      const cancelButton = document.createElement('button');
      cancelButton.type = 'button';
      cancelButton.className = 'profile-name-action-button';
      cancelButton.setAttribute('aria-label', t('common.cancel'));
      cancelButton.hidden = true;
      const cancelIcon = document.createElement('img');
      cancelIcon.className = 'profile-name-action-icon';
      cancelIcon.src = '../../assets/icon-close.svg';
      cancelIcon.alt = '';
      cancelButton.appendChild(cancelIcon);

      function enterEditMode() {
        value.hidden = true;
        input.hidden = false;
        input.value = user[field];
        input.focus();
        editIcon.src = '../../assets/icon-check.svg';
        editButton.disabled = true;
        cancelButton.hidden = false;
      }

      function exitEditMode() {
        value.hidden = false;
        input.hidden = true;
        editIcon.src = '../../assets/icon-edit.svg';
        editButton.disabled = false;
        cancelButton.hidden = true;
      }

      function save() {
        const newValue = input.value.trim();
        if (newValue) {
          user[field] = newValue;
          window.storage.updateUser({ [field]: newValue });
          value.textContent = newValue;
        }
        exitEditMode();
      }

      function cancelEdit() {
        input.value = user[field];
        exitEditMode();
      }

      input.addEventListener('input', () => {
        editButton.disabled = input.value.trim() === user[field];
      });

      editButton.addEventListener('click', () => {
        if (input.hidden) {
          enterEditMode();
        } else {
          save();
        }
      });

      cancelButton.addEventListener('click', cancelEdit);

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !editButton.disabled) save();
      });

      editWrap.appendChild(value);
      editWrap.appendChild(input);
      editWrap.appendChild(editButton);
      editWrap.appendChild(cancelButton);
      row.appendChild(editWrap);

      return row;
    }

    if (isOwnProfile) {
      basics.appendChild(renderEditableNamePart(t('registration.first_name_label'), 'firstName'));
      basics.appendChild(renderEditableNamePart(t('registration.last_name_label'), 'lastName'));
    } else {
      basics.appendChild(renderStaticField(t('profile.name_label'), window.storage.getFullName(user)));
    }
    content.appendChild(basics);

    // points
    content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('profile.points_title') }));

    const pointsList = document.createElement('div');
    pointsList.className = 'profile-points';

    [
      { icon: '../../assets/icon-points-referral.svg', label: t('profile.points_referrals_label'), value: user.referralCount || 0, onClick: isOwnProfile ? () => { window.location.href = '../referral-info/referral-info.html'; } : null },
      { icon: '../../assets/icon-points-loyalty.svg', label: t('profile.points_loyalty_label'), value: user.loyaltyPoints || 0, onClick: isOwnProfile ? () => { window.location.href = '../loyalty-info/loyalty-info.html'; } : null }
    ].forEach(({ icon, label, value, onClick }) => {
      const item = document.createElement(onClick ? 'button' : 'div');
      if (onClick) item.type = 'button';
      item.className = 'profile-point-item';
      if (onClick) item.addEventListener('click', onClick);

      const iconEl = document.createElement('img');
      iconEl.className = 'profile-point-icon';
      iconEl.src = icon;
      iconEl.alt = '';
      item.appendChild(iconEl);

      const valueEl = document.createElement('span');
      valueEl.className = 'profile-point-value';
      valueEl.textContent = value;
      item.appendChild(valueEl);

      const labelEl = document.createElement('span');
      labelEl.className = 'profile-point-label';
      labelEl.textContent = label;
      item.appendChild(labelEl);

      pointsList.appendChild(item);
    });

    content.appendChild(pointsList);

    if (isOwnProfile) {
      const referralRow = document.createElement('div');
      referralRow.className = 'profile-field profile-referral-row';

      const referralLabel = document.createElement('span');
      referralLabel.className = 'profile-field-label';
      referralLabel.textContent = t('profile.referral_link_label');
      referralRow.appendChild(referralLabel);

      const referralValueWrap = document.createElement('div');
      referralValueWrap.className = 'profile-name-edit';

      const referralValue = document.createElement('span');
      referralValue.className = 'profile-field-value';
      referralValue.textContent = user.username;
      referralValueWrap.appendChild(referralValue);

      const referralCopyButton = document.createElement('button');
      referralCopyButton.type = 'button';
      referralCopyButton.className = 'profile-name-action-button';
      referralCopyButton.setAttribute('aria-label', t('profile.referral_link_copy_action'));
      const referralCopyIcon = document.createElement('img');
      referralCopyIcon.className = 'profile-name-action-icon';
      referralCopyIcon.src = '../../assets/icon-copy.svg';
      referralCopyIcon.alt = '';
      referralCopyButton.appendChild(referralCopyIcon);

      let referralCopyResetTimeout;
      referralCopyButton.addEventListener('click', () => {
        navigator.clipboard.writeText(user.username);
        referralCopyIcon.src = '../../assets/icon-check.svg';
        referralCopyButton.setAttribute('aria-label', t('profile.referral_link_copied'));
        clearTimeout(referralCopyResetTimeout);
        referralCopyResetTimeout = setTimeout(() => {
          referralCopyIcon.src = '../../assets/icon-copy.svg';
          referralCopyButton.setAttribute('aria-label', t('profile.referral_link_copy_action'));
        }, 1500);
      });

      referralValueWrap.appendChild(referralCopyButton);
      referralRow.appendChild(referralValueWrap);
      content.appendChild(referralRow);
    }

    // badges
    content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('profile.badges_title') }));

    const userDogs = isOwnProfile ? window.storage.getDogs() : window.storage.getDogsByUserId(user.id);
    const userTickets = isOwnProfile ? window.storage.getTickets() : window.storage.getTicketsByUserId(user.id);

    content.appendChild(
      window.badgeGridModule.renderBadgeGrid({
        badges: window.USER_BADGES_DATA.map((badgeInfo) => ({
          id: badgeInfo.id,
          icon: badgeInfo.icon,
          label: t(badgeInfo.nameKey),
          active: badgeInfo.isEarned({ user, dogs: userDogs, tickets: userTickets }),
          onClick: () => {
            window.location.href = `../badge-detail/badge-detail.html?badge=${badgeInfo.id}&userId=${user.id}`;
          }
        }))
      })
    );

    // dogs
    content.appendChild(window.profileDogsSection.render({
      t,
      storage: window.storage,
      eventsStore: window.eventsStore,
      isOwnProfile,
      user
    }));

    // account
    if (isOwnProfile) {
      content.appendChild(window.profileAccountSection.render({
        t,
        storage: window.storage,
        buttonModule: window.buttonModule,
        modalModule: window.modalModule
      }));
    }

    profilePage.appendChild(
      window.bottomNavModule.renderBottomNav({ active: isOwnProfile ? 'profile' : 'members' })
    );

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
