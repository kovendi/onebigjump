<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Tárca</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/navbar/navbar.css" />
  <link rel="stylesheet" href="../../modules/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="../../modules/section-title/section-title.css" />
  <link rel="stylesheet" href="../../modules/dog-card/dog-card.css" />
  <link rel="stylesheet" href="../../modules/ticket-card/ticket-card.css" />
  <link rel="stylesheet" href="../../modules/modal/modal.css" />
  <link rel="stylesheet" href="wallet.css" />
</head>
<body>
  <div id="screen-content">
    <div class="wallet-page" id="wallet-page">
      <div class="wallet-content" id="wallet-content">
        <div class="wallet-section" id="wallet-dogs-section">
          <div id="wallet-dogs-list" class="wallet-dogs-list"></div>
          <p class="wallet-section-empty" id="wallet-dogs-empty" hidden></p>
        </div>

        <div class="wallet-section" id="wallet-tickets-section">
          <div id="wallet-tickets-list" class="wallet-tickets-list"></div>
          <p class="wallet-section-empty" id="wallet-tickets-empty" hidden></p>
        </div>
      </div>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/navbar/navbar.js"></script>
  <script src="../../modules/bottom-nav/bottom-nav.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/section-title/section-title.js"></script>
  <script src="../../modules/modal/modal.js"></script>
  <script src="../../modules/date/date.js"></script>
  <script src="../../modules/dog-card/dog-card.js"></script>
  <script src="../../modules/ticket-card/ticket-card.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script src="../events/events-data.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    const walletPage = document.getElementById('wallet-page');

    walletPage.prepend(
      window.navbarModule.renderNavbar({ title: t('wallet.title'), hasNotification: true })
    );

    // Dogs section
    const dogsSection = document.getElementById('wallet-dogs-section');
    dogsSection.prepend(
      window.sectionTitleModule.renderSectionTitle({ text: t('wallet.dogs_title') })
    );

    const ALL_DOGS = window.storage.getDogs();
    const GOOD_DOG_CARD_DOGS = ALL_DOGS.filter((dog) => dog.goodDogCard);
    const dogsList = document.getElementById('wallet-dogs-list');
    const dogsEmpty = document.getElementById('wallet-dogs-empty');

    if (GOOD_DOG_CARD_DOGS.length === 0) {
      dogsEmpty.hidden = false;
      dogsEmpty.textContent = t('wallet.dogs_empty');
    } else {
      GOOD_DOG_CARD_DOGS.forEach((dog) => {
        dogsList.appendChild(
          window.dogCardModule.renderDogCard({
            photo: dog.photo,
            name: dog.name,
            breed: t(`add_dog.breed_${dog.breed}`),
            birthdate: dog.birthdate,
            microchip: dog.microchip,
            goodDogCard: true
          })
        );
      });
    }

    // Tickets section
    const ticketsSection = document.getElementById('wallet-tickets-section');
    ticketsSection.prepend(
      window.sectionTitleModule.renderSectionTitle({ text: t('wallet.tickets_title') })
    );

    const ticketsList = document.getElementById('wallet-tickets-list');
    const ticketsEmpty = document.getElementById('wallet-tickets-empty');
    const QR_SCAN_DELAY = 3000;
    const QR_AUTO_CLOSE_DELAY = 2000;

    function openTicketQrModal(ticket) {
      const content = document.createElement('div');
      content.className = 'wallet-qr-modal';

      const title = document.createElement('div');
      title.className = 'wallet-qr-modal__title';
      title.textContent = t('wallet.qr_modal_title');
      content.appendChild(title);

      const image = document.createElement('img');
      image.className = 'wallet-qr-modal__image';
      image.src = '../../assets/qr-placeholder.svg';
      image.alt = '';
      content.appendChild(image);

      const description = document.createElement('p');
      description.className = 'wallet-qr-modal__description';
      description.textContent = t('wallet.qr_modal_description');
      content.appendChild(description);

      window.modalModule.openModal(content);

      setTimeout(() => {
        title.textContent = t('wallet.qr_scanned_title');
        image.src = '../../assets/icon-success.svg';
        description.textContent = t('wallet.qr_scanned_description');

        window.storage.updateTicket(ticket.id, { used: true });
        renderTicketsList();

        setTimeout(() => {
          window.modalModule.closeModal();
        }, QR_AUTO_CLOSE_DELAY);
      }, QR_SCAN_DELAY);
    }

    function renderTicketsList() {
      const tickets = window.storage.getTickets();
      ticketsList.innerHTML = '';

      if (tickets.length === 0) {
        ticketsEmpty.hidden = false;
        ticketsEmpty.textContent = t('wallet.tickets_empty');
        return;
      }

      ticketsEmpty.hidden = true;
      const sortedTickets = [...tickets].sort((a, b) => (a.used ? 1 : 0) - (b.used ? 1 : 0));
      sortedTickets.forEach((ticket) => {
        const event = window.EVENTS_DATA.find((item) => item.id === ticket.eventId);
        ticketsList.appendChild(
          window.ticketCardModule.renderTicketCard({
            imageUrl: event ? event.image_url : '../../assets/icon-nav-tickets.svg',
            eventName: ticket.eventName,
            ticketNumber: ticket.ticketNumber,
            used: !!ticket.used,
            onQrClick: () => openTicketQrModal(ticket)
          })
        );
      });
    }

    renderTicketsList();

    walletPage.appendChild(
      window.bottomNavModule.renderBottomNav({ active: 'wallet' })
    );

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
