<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Kutya profil</title>
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../../modules/iphone-frame/iphone-frame.css" />
  <link rel="stylesheet" href="../../modules/navbar/navbar.css" />
  <link rel="stylesheet" href="../../modules/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../modules/section-title/section-title.css" />
  <link rel="stylesheet" href="../../modules/button/button.css" />
  <link rel="stylesheet" href="../../modules/modal/modal.css" />
  <link rel="stylesheet" href="dog-profile.css" />
</head>
<body>
  <div id="screen-content">
    <div class="dog-profile-page" id="dog-profile-page">
      <div class="dog-profile-content" id="dog-profile-content"></div>

      <div class="dog-profile-not-found" id="dog-profile-not-found" hidden>
        <img class="dog-profile-not-found-icon" src="../../assets/icon-dogs.svg" alt="" />
        <p class="dog-profile-not-found-title" id="dog-profile-not-found-title"></p>
        <p class="dog-profile-not-found-description" id="dog-profile-not-found-description"></p>
      </div>
    </div>
  </div>

  <script src="../../locales/hu.js"></script>
  <script src="../../locales/en.js"></script>
  <script src="../../locales/ro.js"></script>
  <script src="../../modules/i18n/i18n.js"></script>
  <script src="../../modules/iphone-frame/iphone-frame.js"></script>
  <script src="../../modules/navbar/navbar.js"></script>
  <script src="../../modules/bottom-nav/bottom-nav.js"></script>
  <script src="../../modules/section-title/section-title.js"></script>
  <script src="../../modules/button/button.js"></script>
  <script src="../../modules/modal/modal.js"></script>
  <script src="../../modules/date/date.js"></script>
  <script src="../../modules/storage/storage.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    const dogProfilePage = document.getElementById('dog-profile-page');
    const dogId = new URLSearchParams(window.location.search).get('id');
    const DOGS_DATA = window.storage.getDogs();
    const dogIndex = DOGS_DATA.findIndex((dog) => dog.id === dogId);
    const dog = dogIndex !== -1 ? DOGS_DATA[dogIndex] : null;

    dogProfilePage.prepend(
      window.navbarModule.renderNavbar({ title: dog ? dog.name : t('dog_profile.not_found_title'), showBack: true })
    );

    const content = document.getElementById('dog-profile-content');
    const notFound = document.getElementById('dog-profile-not-found');

    if (!dog) {
      content.hidden = true;
      notFound.hidden = false;
      document.getElementById('dog-profile-not-found-title').textContent = t('dog_profile.not_found_title');
      document.getElementById('dog-profile-not-found-description').textContent = t('dog_profile.not_found_description');
    } else {
      const goodDogCard = !!dog.goodDogCard;

      // photo
      const photo = document.createElement('img');
      photo.className = 'dog-profile-photo';
      photo.src = dog.photo || '../../assets/icon-dogs.svg';
      photo.alt = '';
      content.appendChild(photo);

      // name + edit
      const nameRow = document.createElement('div');
      nameRow.className = 'dog-profile-name-row';

      const nameEl = document.createElement('span');
      nameEl.className = 'dog-profile-name';
      nameEl.textContent = dog.name;
      nameRow.appendChild(nameEl);

      const editButton = document.createElement('button');
      editButton.type = 'button';
      editButton.className = 'dog-profile-edit-button';
      editButton.setAttribute('aria-label', t('dog_profile.edit_action'));
      const editIcon = document.createElement('img');
      editIcon.className = 'dog-profile-edit-icon';
      editIcon.src = '../../assets/icon-edit.svg';
      editIcon.alt = '';
      editButton.appendChild(editIcon);
      editButton.addEventListener('click', () => {
        window.location.href = `../add-dog/add-dog.html?dogId=${dog.id}&returnTo=${encodeURIComponent(`../dog-profile/dog-profile.html?id=${dog.id}`)}`;
      });
      nameRow.appendChild(editButton);

      content.appendChild(nameRow);

      // basics
      content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('dog_profile.basics_title') }));

      const basics = document.createElement('div');
      basics.className = 'dog-profile-fields';

      function renderField(label, value) {
        const row = document.createElement('div');
        row.className = 'dog-profile-field';
        const labelEl = document.createElement('span');
        labelEl.className = 'dog-profile-field-label';
        labelEl.textContent = label;
        const valueEl = document.createElement('span');
        valueEl.className = 'dog-profile-field-value';
        valueEl.textContent = value;
        row.appendChild(labelEl);
        row.appendChild(valueEl);
        return row;
      }

      const owner = window.storage.getUsers().find((u) => u.id === dog.userId);
      if (owner) {
        const ownerRow = document.createElement('div');
        ownerRow.className = 'dog-profile-field';

        const ownerLabel = document.createElement('span');
        ownerLabel.className = 'dog-profile-field-label';
        ownerLabel.textContent = t('dog_profile.owner_label');
        ownerRow.appendChild(ownerLabel);

        const ownerValue = document.createElement('div');
        ownerValue.className = 'dog-profile-owner-value';

        const ownerPhoto = document.createElement('img');
        ownerPhoto.className = 'dog-profile-owner-photo';
        ownerPhoto.src = owner.photo || '../../assets/icon-nav-profile.svg';
        ownerPhoto.alt = '';
        ownerValue.appendChild(ownerPhoto);

        const ownerName = document.createElement('span');
        ownerName.className = 'dog-profile-field-value';
        ownerName.textContent = owner.name;
        ownerValue.appendChild(ownerName);

        ownerRow.appendChild(ownerValue);
        basics.appendChild(ownerRow);
      }

      basics.appendChild(renderField(t('dog_profile.breed_label'), t(`add_dog.breed_${dog.breed}`)));
      basics.appendChild(renderField(t('dog_profile.birthdate_label'), window.dateModule.formatDate(dog.birthdate)));
      basics.appendChild(renderField(t('dog_profile.microchip_label'), dog.microchip));
      content.appendChild(basics);

      // badges
      content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('dog_profile.badges_title') }));

      const badges = document.createElement('div');
      badges.className = 'dog-profile-badges';

      if (goodDogCard) {
        const badge = document.createElement('button');
        badge.type = 'button';
        badge.className = 'dog-profile-badge';
        const badgeIcon = document.createElement('img');
        badgeIcon.className = 'dog-profile-badge-icon';
        badgeIcon.src = '../../assets/icon-badge-good-dog.svg';
        badgeIcon.alt = '';
        badge.appendChild(badgeIcon);
        badge.appendChild(document.createTextNode(t('dog_card.good_dog_badge')));
        badge.addEventListener('click', () => {
          window.location.href = '../good-dog-card/good-dog-card.html';
        });
        badges.appendChild(badge);

        badges.appendChild(
          window.buttonModule.renderButton({
            label: t('dog_card.qr_action'),
            variant: 'secondary',
            iconSrc: '../../assets/icon-qr.svg',
            onClick: () => {
              const qrContent = document.createElement('div');
              qrContent.className = 'dog-profile-qr-modal';

              const title = document.createElement('div');
              title.className = 'dog-profile-qr-title';
              title.textContent = t('dog_card.qr_modal_title');
              qrContent.appendChild(title);

              const qr = document.createElement('img');
              qr.className = 'dog-profile-qr-image';
              qr.src = '../../assets/qr-placeholder.svg';
              qr.alt = '';
              qrContent.appendChild(qr);

              const description = document.createElement('p');
              description.className = 'dog-profile-qr-description';
              description.textContent = t('dog_card.qr_modal_description');
              qrContent.appendChild(description);

              window.modalModule.openModal(qrContent);
            }
          })
        );
      } else {
        const noBadges = document.createElement('p');
        noBadges.className = 'dog-profile-no-badges';
        noBadges.textContent = t('dog_profile.no_badges');
        badges.appendChild(noBadges);
      }

      content.appendChild(badges);

      // health book / passport
      content.appendChild(window.sectionTitleModule.renderSectionTitle({ text: t('dog_profile.health_book_title') }));

      const healthBookFiles = ['oltasi_konyv.pdf', 'chip_igazolas.pdf', 'allatorvosi_igazolas.pdf'];
      const healthBook = document.createElement('div');
      healthBook.className = 'dog-profile-files';

      healthBookFiles.forEach((fileName) => {
        const row = document.createElement('div');
        row.className = 'dog-profile-file';

        const nameEl = document.createElement('span');
        nameEl.className = 'dog-profile-file-name';
        nameEl.textContent = fileName;
        row.appendChild(nameEl);

        row.appendChild(
          window.buttonModule.renderButton({
            label: t('dog_profile.download_action'),
            variant: 'text-accent',
            iconSrc: '../../assets/icon-download.svg'
          })
        );

        healthBook.appendChild(row);
      });

      content.appendChild(healthBook);
    }

    dogProfilePage.appendChild(
      window.bottomNavModule.renderBottomNav({ active: 'dogs' })
    );

    if (!window.iphoneFrame.isRealMobileDevice()) {
      document.body.appendChild(window.iphoneFrame.renderIphoneFrame(document.getElementById('screen-content')));
      document.body.classList.add('has-iphone-frame');
    }
  </script>
</body>
</html>
