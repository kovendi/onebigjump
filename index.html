<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Mockup</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="modules/button/button.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div id="screen-content">
    <div class="landing-page">
      <img class="landing-logo" src="assets/onebigjump.png" alt="" />
      <h1 class="landing-title" id="landing-title"></h1>
      <p class="landing-subtitle" id="landing-subtitle"></p>
      <div class="landing-actions" id="landing-actions"></div>
    </div>
  </div>

  <script src="version.js"></script>
  <script src="locales/hu.js"></script>
  <script src="locales/en.js"></script>
  <script src="locales/ro.js"></script>
  <script src="modules/i18n/i18n.js"></script>
  <script src="modules/button/button.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    document.getElementById('landing-title').textContent = t('landing.title');
    document.getElementById('landing-subtitle').textContent = t('landing.subtitle');

    const actions = document.getElementById('landing-actions');
    const tryAppRow = document.createElement('div');
    tryAppRow.className = 'landing-update-history-row';
    tryAppRow.appendChild(window.buttonModule.renderButton({
      label: t('landing.try_app_action'),
      variant: 'primary',
      onClick: () => { window.location.href = 'pages/login/login.html'; },
    }));
    const clearCacheButton = window.buttonModule.renderButton({
      label: t('landing.clear_cache_action'),
      variant: 'secondary',
      onClick: () => {
        localStorage.removeItem('oneBigJumpDb');
        clearCacheButton.disabled = true;
      },
    });
    tryAppRow.appendChild(clearCacheButton);
    actions.appendChild(tryAppRow);
    actions.appendChild(window.buttonModule.renderButton({
      label: t('landing.style_guide_action'),
      variant: 'secondary',
      onClick: () => { window.location.href = 'pages/style-guide/style-guide.html'; },
    }));

    const updateHistoryRow = document.createElement('div');
    updateHistoryRow.className = 'landing-update-history-row';
    updateHistoryRow.appendChild(window.buttonModule.renderButton({
      label: t('landing.update_history_action'),
      variant: 'secondary',
      onClick: () => { window.location.href = 'pages/update-history/update-history.html'; },
    }));
    const versionLabel = document.createElement('span');
    versionLabel.className = 'landing-version-label';
    versionLabel.textContent = window.APP_VERSION;
    updateHistoryRow.appendChild(versionLabel);
    actions.appendChild(updateHistoryRow);
  </script>
</body>
</html>
