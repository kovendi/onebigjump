<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Big Jump — Mockup</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="modules/button/button.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div id="screen-content">
    <div class="landing-page">
      <img class="landing-logo" src="assets/onebigjump.png" alt="" />
      <h1 class="landing-title" id="landing-title"></h1>
      <p class="landing-subtitle" id="landing-subtitle"></p>
      <div class="landing-actions" id="landing-actions"></div>
    </div>
  </div>

  <script src="version.js"></script>
  <script src="locales/hu.js"></script>
  <script src="locales/en.js"></script>
  <script src="locales/ro.js"></script>
  <script src="modules/i18n/i18n.js"></script>
  <script src="modules/button/button.js"></script>
  <script>
    window.i18n.initI18n();
    const t = window.i18n.t;

    document.getElementById('landing-title').textContent = t('landing.title');
    document.getElementById('landing-subtitle').textContent = t('landing.subtitle');

    const actions = document.getElementById('landing-actions');
    const tryAppRow = document.createElement('div');
    tryAppRow.className = 'landing-update-history-row';
    tryAppRow.appendChild(window.buttonModule.renderButton({
      label: t('landing.try_app_action'),
      variant: 'primary',
      onClick: () => { window.location.href = 'pages/login/login.html'; },
    }));
    actions.appendChild(tryAppRow);
    actions.appendChild(window.buttonModule.renderButton({
      label: t('landing.style_guide_action'),
      variant: 'secondary',
      onClick: () => { window.location.href = 'pages/style-guide/style-guide.html'; },
    }));

    // Assumed browser localStorage quota — no reliable cross-browser API to query it synchronously.
    const STORAGE_QUOTA_BYTES = 5 * 1024 * 1024;

    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function getKeySizes() {
      const sizes = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const value = localStorage.getItem(key) ?? '';
        sizes.push({ key, bytes: (key.length + value.length) * 2 });
      }
      return sizes;
    }

    const cacheBox = document.createElement('div');
    cacheBox.className = 'cache-info-box';

    function renderCacheBox() {
      cacheBox.innerHTML = '';

      const title = document.createElement('div');
      title.className = 'cache-info-title';
      title.textContent = t('landing.cache_title');
      cacheBox.appendChild(title);

      const keySizes = getKeySizes();
      const usedBytes = keySizes.reduce((sum, entry) => sum + entry.bytes, 0);
      const freeBytes = Math.max(STORAGE_QUOTA_BYTES - usedBytes, 0);
      const freePercent = Math.round((freeBytes / STORAGE_QUOTA_BYTES) * 100);

      const freeLabel = document.createElement('div');
      freeLabel.className = 'cache-info-free';
      freeLabel.textContent = t('landing.cache_free_label')
        .replace('{percent}', freePercent)
        .replace('{size}', formatBytes(freeBytes));
      cacheBox.appendChild(freeLabel);

      const list = document.createElement('div');
      list.className = 'cache-info-list';

      if (keySizes.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'cache-info-empty';
        empty.textContent = t('landing.cache_empty');
        list.appendChild(empty);
      } else {
        keySizes.forEach(({ key, bytes }) => {
          const row = document.createElement('div');
          row.className = 'cache-info-row';

          const info = document.createElement('div');
          info.className = 'cache-info-row-text';

          const keyLabel = document.createElement('span');
          keyLabel.className = 'cache-info-key';
          keyLabel.textContent = key;
          info.appendChild(keyLabel);

          const sizeLabel = document.createElement('span');
          sizeLabel.className = 'cache-info-size';
          sizeLabel.textContent = t('landing.cache_key_size')
            .replace('{percent}', Math.round((bytes / STORAGE_QUOTA_BYTES) * 100))
            .replace('{size}', formatBytes(bytes));
          info.appendChild(sizeLabel);

          row.appendChild(info);

          const deleteButton = window.buttonModule.renderButton({
            label: t('landing.cache_delete_key'),
            variant: 'text-accent',
            onClick: () => {
              localStorage.removeItem(key);
              renderCacheBox();
            },
          });
          deleteButton.classList.add('cache-info-delete-button');
          row.appendChild(deleteButton);

          list.appendChild(row);
        });
      }

      cacheBox.appendChild(list);

      if (keySizes.length > 0) {
        const deleteAllButton = window.buttonModule.renderButton({
          label: t('landing.cache_delete_all'),
          variant: 'secondary',
          onClick: () => {
            keySizes.forEach(({ key }) => localStorage.removeItem(key));
            renderCacheBox();
          },
        });
        cacheBox.appendChild(deleteAllButton);
      }
    }

    renderCacheBox();
    actions.appendChild(cacheBox);

    const updateHistoryRow = document.createElement('div');
    updateHistoryRow.className = 'landing-update-history-row';
    updateHistoryRow.appendChild(window.buttonModule.renderButton({
      label: t('landing.update_history_action'),
      variant: 'secondary',
      onClick: () => { window.location.href = 'pages/update-history/update-history.html'; },
    }));
    const versionLabel = document.createElement('span');
    versionLabel.className = 'landing-version-label';
    versionLabel.textContent = window.APP_VERSION;
    updateHistoryRow.appendChild(versionLabel);
    actions.appendChild(updateHistoryRow);
  </script>
</body>
</html>
